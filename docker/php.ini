; Ekklesia CMS — PHP production settings

; Performance
opcache.enable=1
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0

; Upload limits (for media)
upload_max_filesize = 64M
post_max_size = 64M

; Memory
memory_limit = 256M

; Timezone
date.timezone = UTC

; Security
expose_php = Off
