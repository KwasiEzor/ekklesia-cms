services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ekklesia
      DB_USERNAME: ekklesia
      DB_PASSWORD: secret
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-storage:/app/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ekklesia
      POSTGRES_USER: ekklesia
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekklesia"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Queue worker for background jobs
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ekklesia
      DB_USERNAME: ekklesia
      DB_PASSWORD: secret
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-storage:/app/storage
    restart: unless-stopped

volumes:
  postgres-data:
  app-storage:
